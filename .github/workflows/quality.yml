name: quality-checks

on:
  pull_request:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read
  security-events: write

jobs:
  leaking-detector:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/install.sh | sh -s -- -b /usr/local/bin v8.24.2

      - name: Run Gitleaks scan
        id: gitleaks
        continue-on-error: true
        run: |
          gitleaks git --report-format sarif --report-path gitleaks.sarif --exit-code 1 --redact

      - name: Upload SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif

      - name: Fail workflow when secrets are detected
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "Gitleaks detected secrets. Check Security tab for SARIF findings."
          exit 1

  commitlint:
    needs: leaking-detector
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.8.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate commit messages
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.mjs
